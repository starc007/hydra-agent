name = "hydra"
main = "src/index.ts"
compatibility_date = "2026-04-01"
compatibility_flags = ["nodejs_compat"]

[[durable_objects.bindings]]
name = "HYDRA"
class_name = "HydraDO"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["HydraDO"]

[[d1_databases]]
binding = "DB"
database_name = "hydra"
database_id = "REPLACE_AFTER_WRANGLER_D1_CREATE"
migrations_dir = "migrations"

[triggers]
crons = ["* * * * *"]

[vars]
LLM_PROVIDER = "google"
RPC_URL = "https://sepolia.unichain.org"
CHAIN_ID = "1301"
POOL_ID = "REPLACE_AT_TASK_4_0"
POSITION_MANAGER = "REPLACE_AT_TASK_4_0"
STATE_VIEW = "REPLACE_WITH_STATE_VIEW_ADDRESS"
TOKEN_ID = "0"
POSITION_TICK_LOWER = "-887200"
POSITION_TICK_UPPER = "887200"
DASHBOARD_ORIGIN = "*"
SLIPPAGE_BPS = "50"
# Set STABLE_CURRENCY to the address of the USD-stable token in the pool, or leave empty to treat token1 as stable.
STABLE_CURRENCY = ""
IL_THRESHOLD_PCT = "2.5"
DAILY_TX_CAP = "10"
COOLDOWN_SEC = "300"
MIN_CONFIDENCE = "0.7"
TICK_INTERVAL_MS = "10000"
