name = "hydra"
main = "src/index.ts"
compatibility_date = "2026-04-01"
compatibility_flags = ["nodejs_compat"]

[[durable_objects.bindings]]
name = "HYDRA"
class_name = "HydraDO"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["HydraDO"]

[[d1_databases]]
binding = "DB"
database_name = "hydra"
database_id = "874360ea-73e5-4ad6-9ba4-71a6a156e308"
migrations_dir = "migrations"

[[vectorize]]
binding = "VECTORIZE"
index_name = "hydra-experience"

[triggers]
crons = ["* * * * *"]

[vars]
LLM_PROVIDER = "google"
RPC_URL = "https://sepolia.unichain.org"
CHAIN_ID = "1301"
POSITION_MANAGER = "0xf969aee60879c54baaed9f3ed26147db216fd664"
STATE_VIEW = "0xc199f1072a74d4e905aba1a84d9a45e2546b6222"
UNISWAP_API_BASE = "https://api.uniswap.org"
DASHBOARD_ORIGIN = "*"
SLIPPAGE_BPS = "50"
IL_THRESHOLD_PCT = "2.5"
DAILY_TX_CAP = "10"
COOLDOWN_SEC = "300"
MIN_CONFIDENCE = "0.7"
TICK_INTERVAL_MS = "10000"
